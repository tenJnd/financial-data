services:
  hermes-tools:
    image: tenjnd/financial-data:latest
    build: .
    env_file:
      - prod.env
    # SSE mode exposes the MCP server over HTTP on :8000.
    # For stdio integration, drop `command` and `ports` and run via `docker run -i`.
    command: ["--transport", "sse"]
    ports:
      - "8000:8000"
